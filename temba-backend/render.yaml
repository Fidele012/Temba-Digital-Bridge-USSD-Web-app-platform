services:
  # ── Temba API ────────────────────────────────────────────────────────────────
  - type: web
    name: temba-api
    runtime: python
    plan: free
    region: oregon
    rootDir: temba-backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: temba-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: temba-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          name: temba-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: temba-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: temba-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://temba-digital-bridge.vercel.app","http://localhost:5500","http://127.0.0.1:5500"]'
      - key: ALLOWED_HOSTS
        value: '["temba-api.onrender.com","localhost","127.0.0.1"]'
      - key: AT_USERNAME
        value: sandbox
      - key: AT_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAILS_FROM_NAME
        value: Temba Digital Bridge
      - key: EMAILS_FROM_EMAIL
        sync: false
      - key: S3_ENDPOINT_URL
        value: ""
      - key: S3_ACCESS_KEY_ID
        value: ""
      - key: S3_SECRET_ACCESS_KEY
        value: ""
      - key: S3_BUCKET_NAME
        value: temba-uploads
      - key: RATE_LIMIT_PER_MINUTE
        value: 60
      - key: RATE_LIMIT_AUTH_PER_MINUTE
        value: 10
      - key: FIRST_ADMIN_EMAIL
        value: admin@temba.rw
      - key: FIRST_ADMIN_PASSWORD
        sync: false

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: temba-redis
    plan: free
    region: oregon
    ipAllowList: []

databases:
  - name: temba-db
    plan: free
    region: oregon
    databaseName: temba_db
    user: temba
