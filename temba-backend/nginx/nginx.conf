# =============================================================================
# Temba Digital Bridge — NGINX Load Balancer & Reverse Proxy
# =============================================================================
# Sits in front of FastAPI (uvicorn :8000).  All public traffic enters on
# port 80 (terminate TLS here with a real cert in production).
#
# Rate-limit zones (defined once in the http context):
#   api_general  — 60 req/min  per IP  (all other routes)
#   api_auth     — 10 req/min  per IP  (auth & login endpoints)
#   api_ussd     — 120 req/min per IP  (Africa's Talking callback — may burst)
# =============================================================================

limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_ussd:10m    rate=120r/m;

# ---------------------------------------------------------------------------
# Upstream pool — add more "server api-N:8000;" lines to scale horizontally.
# least_conn sends each new request to the least-busy worker.
# ---------------------------------------------------------------------------
upstream temba_api {
    least_conn;
    server api:8000;
    # server api-2:8000;   # uncomment to add a second API replica
    keepalive 32;
}

server {
    listen 80;
    server_name _;      # catch-all; restrict to your domain in production

    # -- Request size (must be >= MAX_FILE_SIZE_MB in .env) ------------------
    client_max_body_size   15M;
    client_body_timeout    30s;
    client_header_timeout  10s;
    keepalive_timeout      65s;

    # -- Gzip compression for JSON/text responses ----------------------------
    gzip            on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary       on;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        application/xml;

    # -- Security headers (duplicated from FastAPI for defence-in-depth) -----
    add_header X-Content-Type-Options  "nosniff"                                   always;
    add_header X-Frame-Options         "DENY"                                      always;
    add_header X-XSS-Protection        "1; mode=block"                             always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"           always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()"  always;

    # -- Common proxy headers (applied to every location) --------------------
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";   # enable keep-alive to upstream

    # =========================================================================
    # /health — Docker/k8s liveness probe; no rate limit, no access log
    # =========================================================================
    location = /health {
        proxy_pass         http://temba_api/health;
        proxy_read_timeout 5s;
        access_log         off;
    }

    # =========================================================================
    # /api/v1/auth/* and /api/v1/users/me — strict rate limit
    # Protects login, register, password-reset, token-refresh from brute force.
    # =========================================================================
    location ~ ^/api/v1/(auth|users/me) {
        limit_req        zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://temba_api;
        proxy_read_timeout 30s;
    }

    # =========================================================================
    # /ussd/callback — Africa's Talking webhook
    # Higher burst tolerance: AT retries rapidly on timeout.
    # =========================================================================
    location = /ussd/callback {
        limit_req        zone=api_ussd burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://temba_api;
        proxy_read_timeout 10s;
    }

    # =========================================================================
    # Everything else — general API routes (/api/v1/*, /docs, /openapi.json)
    # =========================================================================
    location / {
        limit_req        zone=api_general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass            http://temba_api;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }
}
